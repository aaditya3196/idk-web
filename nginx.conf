user  nginx;
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;
events {
  worker_connections  1024;
}
http {
  server_tokens off;
  #more_clear_headers Server;
  #more_set_headers "Server: RdepSecureApp";
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  sendfile        on;
  keepalive_timeout  65;
  server {
    listen       80;
    server_name  localhost;
    location / {
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.zoho.in https://*.zohostatic.in; font-src 'self' 'unsafe-inline' https://*.zoho.in https://*.zohostatic.in; object-src 'none'; style-src 'self' 'unsafe-inline' https://*.zoho.in https://*.zohostatic.in; img-src 'self' https://*.amazonaws.com https://*.zoho.in https://*.zohostatic.in data: blob:; connect-src 'self' https://*.rdep.io https://*.zoho.in https://*.zohostatic.in https://*.proenx.com; frame-src 'self' https://*.rdep.io https://*.proenx.com;" always;
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

      root   /app;
      index  index.html;
      try_files $uri $uri/ /index.html?uri=$uri;
    }
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
      root   /usr/share/nginx/html;
    }
  }
}